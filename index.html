<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Sản Phẩm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Dashboard</h2>
    
    <div class="toolbar">
        <input type="text" id="search_txt" placeholder="Tìm theo tiêu đề..." oninput="handleSearch()">
        
        <select id="page_size" onchange="handlePageSize()">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
        </select>

        <button onclick="sortData('price')">Sắp xếp theo giá</button>
        <button onclick="sortData('title')">Sắp xếp theo tên</button>
    </div>

    <table id="product-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Hình Ảnh</th>
                <th>Tiêu Đề</th>
                <th>Giá</th>
                <th>Mô Tả (Hover)</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <div id="pagination" style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;"></div>
</div>

<script src="user_role_logic.js"></script> 
<script src="buoi5.js"></script>
</body>
</html>
